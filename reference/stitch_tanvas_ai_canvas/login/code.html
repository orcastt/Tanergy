<body class="bg-surface-container-low text-on-surface font-body antialiased min-h-screen flex items-center justify-center p-4">
<!-- Main Container -->
<main class="w-full max-w-md">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl ring-shadow-standard p-8 md:p-12 flex flex-col items-center">
<!-- Brand / Logo -->
<div class="mb-10 text-center">
<h1 class="font-cal-sans text-3xl font-bold text-primary-container tracking-tight">TANVAS</h1>
</div>
<!-- Header Text -->
<div class="w-full text-center mb-8">
<h2 class="font-cal-sans text-xl font-semibold text-primary mb-2">Welcome back</h2>
<p class="text-secondary text-sm font-medium">Log in to your workspace</p>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-6">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-secondary text-xs font-semibold uppercase tracking-wider" for="email">Email Address</label>
<input class="input-ghost w-full py-2 text-primary placeholder:text-outline-variant font-medium transition-shadow duration-200" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary py-3 rounded-lg font-semibold text-sm transition-transform duration-150 active:scale-95 flex items-center justify-center gap-2 mt-2" type="submit">
                    Send Magic Link
                    <span aria-hidden="true" class="material-symbols-outlined text-sm" data-icon="arrow_forward" data-weight="fill">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center my-8 gap-4">
<div class="h-px bg-surface-container-highest flex-1"></div>
<span class="text-secondary text-xs font-medium uppercase tracking-wider">Or</span>
<div class="h-px bg-surface-container-highest flex-1"></div>
</div>
<!-- Secondary Action -->
<button class="w-full bg-surface-container-lowest text-primary py-3 rounded-lg ring-shadow-standard hover:bg-surface transition-colors duration-200 font-semibold text-sm flex items-center justify-center gap-3">
<svg aria-hidden="true" class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<div class="mt-8 text-center w-full">
<p class="text-secondary text-xs">By continuing, you agree to our <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.</p>
</div>
</div>
</main>
