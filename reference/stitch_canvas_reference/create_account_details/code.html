<body class="bg-surface-container-lowest text-on-surface antialiased min-h-screen flex w-full">
<!-- Left Panel: Brand / Atmospheric Side (Mint Green) -->
<div class="hidden lg:flex flex-col w-2/5 bg-tertiary-fixed p-12 justify-between relative overflow-hidden">
<!-- Subtle Background Texture/Image -->
<div class="absolute inset-0 w-full h-full opacity-30 mix-blend-multiply" data-alt="A softly lit, abstract architectural space featuring smooth, flowing lines and gentle curves. The color palette is dominated by muted mint greens and pristine whites, creating a calm, minimalist, and highly organized aesthetic suitable for a premium digital product context. The lighting is high-key and serene." role="img" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBz6cy1YLNOKD-osJgVFGpx5tpIfNHbC7ApBNU9otslhNXKaZ3a5O4Bq9s9A07mkbe0WcBq3z844r2x4AFZHAEfy7SpPx3QXVtnB57lMRwMrAqv1LNpda5ppDcvwwxrYpmXdmNSPOLhSpTjzVWxksUIidyYsTlqMQ13FuMhfWQJrIjCy0eHQQ8wUIMsJYVHeAGgGr2M3sZEWqeA_JRHmx62o1-LpaykFupPREOYRmEz4fx1HtEll2iVGA5I4I3EQgj6DP16vWcplbU'); background-size: cover; background-position: center;">
</div>
<!-- Content overlay -->
<div class="relative z-10 flex flex-col h-full justify-between">
<div class="font-display-xl text-display-xl text-on-tertiary-fixed font-black uppercase tracking-widest text-xl">
                Editorial
            </div>
<div class="max-w-md">
<h2 class="font-headline-md text-headline-md text-on-tertiary-fixed-variant mb-6">
                    Crafting organized potential.
                </h2>
<p class="font-body-base text-body-base text-on-tertiary-fixed-variant opacity-80">
                    Your workspace is a blank canvas. Let's set the foundation for clarity and focus.
                </p>
</div>
</div>
</div>
<!-- Right Panel: White Canvas Form -->
<div class="flex-1 flex flex-col justify-center items-center p-8 sm:p-12 lg:p-24 bg-surface-container-lowest overflow-y-auto">
<div class="w-full max-w-md space-y-16">
<!-- Mobile Logo (Hidden on Desktop) -->
<div class="lg:hidden font-display-xl text-display-xl text-on-surface font-black uppercase tracking-widest text-xl mb-12">
                Editorial
            </div>
<!-- Header -->
<div class="space-y-4">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Account Details</h1>
<p class="font-body-base text-body-base text-on-surface-variant">
                    Please provide a few details to finalize your profile and set up your environment.
                </p>
</div>
<!-- Form -->
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div class="relative flex flex-col space-y-2 group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="fullName">Full Name</label>
<input class="w-full border-t-0 border-x-0 border-b border-outline-variant bg-transparent py-3 px-0 focus:ring-0 focus:outline-none focus:border-primary transition-colors font-body-base text-body-base text-on-surface placeholder-outline" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
<!-- Workspace Name Field -->
<div class="relative flex flex-col space-y-2 group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="workspaceName">Workspace Name</label>
<input class="w-full border-t-0 border-x-0 border-b border-outline-variant bg-transparent py-3 px-0 focus:ring-0 focus:outline-none focus:border-primary transition-colors font-body-base text-body-base text-on-surface placeholder-outline" id="workspaceName" name="workspaceName" placeholder="Acme Corp" required="" type="text"/>
</div>
<!-- Role Field -->
<div class="relative flex flex-col space-y-2 group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="role">Role</label>
<select class="w-full border-t-0 border-x-0 border-b border-outline-variant bg-transparent py-3 px-0 focus:ring-0 focus:outline-none focus:border-primary transition-colors font-body-base text-body-base text-on-surface appearance-none cursor-pointer" id="role" name="role" required="">
<option class="text-outline" disabled="" selected="" value="">Select your primary role</option>
<option value="design">Design</option>
<option value="engineering">Engineering</option>
<option value="product">Product Management</option>
<option value="marketing">Marketing</option>
<option value="other">Other</option>
</select>
<!-- Custom Chevron -->
<div class="absolute right-0 bottom-3 pointer-events-none text-outline-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
<!-- Submit Action -->
<div class="pt-8">
<button class="w-full bg-primary-container text-white py-4 px-8 rounded-xl font-body-base text-body-base flex items-center justify-center space-x-2 hover:bg-primary transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-primary-container outline-none" type="submit">
<span>Get Started</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</div>
</div>
