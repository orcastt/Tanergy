<body class="bg-surface-container-lowest text-on-surface font-body-base antialiased min-h-screen flex">
<!-- Left Panel (Brand Context) -->
<div class="hidden lg:flex lg:w-1/2 relative flex-col justify-between overflow-hidden">
<!-- Lively Mint Green Background Image -->
<img class="absolute inset-0 w-full h-full object-cover z-0" data-alt="A vibrant and lively mint green abstract background texture with soft, flowing gradients and subtle, luminous organic overlays. The scene is brightly lit by high-key, diffused white lighting, evoking a fresh, modern, and highly energetic atmosphere perfectly aligned with a premium, quietly editorial creative platform. The smooth transitions of the light green and teal hues create a serene sense of deep, organized potential without visually overwhelming the viewer, maintaining a pristine and minimalist aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCi9iUzV3_nA5aREfgPqguaVWEy7bEFFU2Mzc18d1nJuKMORfIAjumPWO8hxTwdzOgHkwTOyZpia4QVlUTLmrn7ZZA0vnvwSg4SH8CvSHVBi7CzXkPUSkPMh4KmQmdN35Hk_ypnsxdZMKmkN0_xy2lz4dYh_4wBItPZYkz2PuF_hJSXmwZR4_hD_81yR8cwuEQgFlKxLLDBduEoVCoOhZpTx-3CdCYrSXwQk_3w7lj-a5V4QsBH9NDS-nS96pzoBHwI039dVu-tYe4"/>
<!-- Overlay for contrast if needed, keeping it very light to maintain 'mint' feel -->
<div class="absolute inset-0 bg-tertiary-fixed/30 z-10 mix-blend-multiply"></div>
<!-- Content -->
<div class="relative z-20 flex flex-col justify-between h-full p-section-v-padding">
<div>
<!-- Logo Anchor -->
<h1 class="font-display-xl text-display-xl text-on-tertiary font-bold tracking-tight">TANGENT</h1>
</div>
<div>
<p class="font-headline-md text-headline-md text-on-tertiary max-w-md">
                    Quietly Editorial.
                </p>
</div>
</div>
</div>
<!-- Right Panel (Registration Canvas) -->
<div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-8 lg:p-section-v-padding relative">
<!-- Form Container -->
<div class="w-full max-w-[400px] flex flex-col">
<!-- Header -->
<div class="mb-12 text-center lg:text-left">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-4">Create Account</h2>
<p class="font-body-base text-body-base text-on-surface-variant">
                    Join Tangent to begin structuring your creative workflows.
                </p>
</div>
<!-- Inputs -->
<form class="flex flex-col space-y-8 mb-10">
<!-- Email Field -->
<div class="flex flex-col relative group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-2 transition-colors group-focus-within:text-primary-container" for="email">
                        Email Address
                    </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant pb-3 px-0 font-body-base text-body-base text-on-surface placeholder:text-outline focus:ring-0 focus:border-b focus:border-primary-container transition-colors" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col relative group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-2 transition-colors group-focus-within:text-primary-container flex justify-between" for="password">
<span>Password</span>
</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant pb-3 px-0 font-body-base text-body-base text-on-surface placeholder:text-outline focus:ring-0 focus:border-b focus:border-primary-container transition-colors" id="password" placeholder="Min. 8 characters" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-0 bottom-3 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary rounded-xl py-4 mt-4 font-body-base text-body-base font-medium hover:bg-primary transition-colors flex items-center justify-center space-x-2" type="button">
<span>Sign Up</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="text-center lg:text-left">
<p class="font-body-base text-body-base text-on-surface-variant">
                    Already have an account? 
                    <a class="text-on-surface font-medium border-b border-on-surface hover:text-primary-container transition-colors pb-0.5 ml-1" href="#">Log in</a>
</p>
</div>
</div>
</div>
